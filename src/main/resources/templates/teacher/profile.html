<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile - RoundTable</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
    <style>
        .lecturer-header { background: #f8f9fa; padding: 40px 0; border-bottom: 1px solid #dee2e6; }
        .avatar-img { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="lecturer-header">
    <div class="container text-center">
        <img th:src="${teacher.avatarUrl != null ? teacher.avatarUrl : '/images/ui-icons_444444_256x240.png'}" class="avatar-img mb-3" alt="Avatar">
        <h1 th:text="${teacher.userName}">Teacher Name</h1>
        <p class="text-muted" th:text="${teacher.specialty}">Specialty</p>
        <span class="badge bg-warning text-dark" th:text="${teacher.role}">Role</span>
    </div>
</div>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-4">
            <h3>About Me</h3>
            <p th:text="${teacher.bio != null ? teacher.bio : 'No bio available.'}">Bio information goes here...</p>
            <hr>
            <a th:href="@{/teacher/class}" class="btn btn-primary">
                <i class="fa fa-book"></i> My Courses
            </a>
        </div>
        <div class="col-md-8">
            <h3>My Teaching Schedule</h3>
            <p class="text-muted">View and manage your courses from the My Courses page.</p>
            <a th:href="@{/teacher/class}" class="btn btn-success">
                <i class="fa fa-plus"></i> Create New Course
            </a>
        </div>
    </div>
</div>

<script th:src="@{/js/jquery-3.6.0.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
