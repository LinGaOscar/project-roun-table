<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Courses - RoundTable</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>My Courses</h2>
        <a th:href="@{/teacher/class/add}" class="btn btn-primary">Create New Course</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <table class="table table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Venue</th>
            <th>Schedule</th>
            <th>Capacity</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${classList}">
            <td>
                <strong th:text="${c.title}">Title</strong><br>
                <small class="text-muted" th:text="${c.subTitle}">Subtitle</small>
            </td>
            <td>
                <span th:if="${c.venue != null}" th:text="${c.venue.name}">Venue</span>
                <span th:if="${c.venue == null}" class="text-muted">TBD</span>
            </td>
            <td>
                <span th:text="${c.date}">Date</span><br>
                <small class="badge bg-secondary" th:text="${c.weekly}">Weekly</small>
            </td>
            <td th:text="${c.maxParticipants != null ? c.maxParticipants : 'Unlimited'}">Capacity</td>
            <td>
                <div class="btn-group">
                    <a th:href="@{/teacher/class/edit/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                    <a th:href="@{/teacher/class/delete/{id}(id=${c.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure?')">Delete</a>
                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(classList)}">
            <td colspan="5" class="text-center text-muted">No courses yet. Click "Create New Course" to add one.</td>
        </tr>
        </tbody>
    </table>
</div>

<script th:src="@{/js/jquery-3.6.0.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
