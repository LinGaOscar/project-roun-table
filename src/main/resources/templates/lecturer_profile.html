<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lecturer Profile</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <style>
        .lecturer-header { background: #f8f9fa; padding: 40px 0; border-bottom: 1px solid #dee2e6; }
        .avatar-img { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" th:href="@{/index}">RoundTable</a>
</nav>

<div class="lecturer-header">
    <div class="container text-center">
        <img th:src="${lecturer.avatarUrl != null ? lecturer.avatarUrl : '/images/ui-icons_444444_256x240.png'}" class="avatar-img mb-3" alt="Avatar">
        <h1 th:text="${lecturer.userName}">Lecturer Name</h1>
        <p class="text-muted" th:text="${lecturer.specialty}">Specialty</p>
    </div>
</div>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-4">
            <h3>About Me</h3>
            <p th:text="${lecturer.bio}">Bio information goes here...</p>
        </div>
        <div class="col-md-8">
            <h3>Upcoming Classes</h3>
            <div class="list-group">
                <div th:each="c : ${classes}" class="list-group-item list-group-item-action flex-column align-items-start">
                    <div class="d-flex w-100 justify-content-between">
                        <h5 class="mb-1" th:text="${c.title}">Class Title</h5>
                        <small th:text="${c.date}">Date</small>
                    </div>
                    <p class="mb-1" th:text="${c.subTitle}">Subtitle</p>
                    <small th:text="${c.venue != null ? 'Venue: ' + c.venue.name : 'No Venue Assigned'}">Venue</small>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(classes)}" class="alert alert-info">
                No classes scheduled for this instructor yet.
            </div>
        </div>
    </div>
</div>
</body>
</html>
