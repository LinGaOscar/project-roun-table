<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - RoundTable</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <h2><i class="fa fa-users"></i> RoundTable</h2>
        <p class="text-muted">Sign in to start your session</p>
    </div>

    <!-- Spring Security Login Error -->
    <div th:if="${loginError}" class="alert alert-danger" role="alert" th:text="${loginError}"></div>
    <!-- Logout Message -->
    <div th:if="${logoutMessage}" class="alert alert-success" role="alert" th:text="${logoutMessage}"></div>

    <form th:action="@{/perform_login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Account</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Enter your account" required autofocus>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">Log In</button>
        </div>
    </form>
</div>

<script th:src="@{/js/jquery-3.6.0.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
