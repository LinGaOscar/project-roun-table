<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - RoundTable</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
</head>
<body>
<div th:replace="fragments/admin_navbar :: admin_navbar"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="fragments/admin_sidebar :: admin_sidebar"></div>
        
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Dashboard</h1>
            </div>
            
            <div class="row">
                <div class="col-md-4">
                    <div class="card text-white bg-primary mb-3">
                        <div class="card-header">Total Classes</div>
                        <div class="card-body">
                            <h2 class="card-title" th:text="${totalClasses}">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-white bg-success mb-3">
                        <div class="card-header">Total Venues</div>
                        <div class="card-body">
                            <h2 class="card-title" th:text="${totalVenues}">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-white bg-warning mb-3">
                        <div class="card-header">Total Users</div>
                        <div class="card-body">
                            <h2 class="card-title" th:text="${totalUsers}">0</h2>
                        </div>
                    </div>
                </div>
            </div>
            
            <h2 class="mt-4">Quick Actions</h2>
            <div class="row mt-3">
                <div class="col-md-3">
                    <a th:href="@{/admin/class}" class="btn btn-primary w-100 mb-2">
                        <i class="fa fa-book"></i> Manage Classes
                    </a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/admin/venue}" class="btn btn-success w-100 mb-2">
                        <i class="fa fa-building"></i> Manage Venues
                    </a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/admin/user}" class="btn btn-info w-100 mb-2">
                        <i class="fa fa-users"></i> Manage Users
                    </a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/}" class="btn btn-secondary w-100 mb-2">
                        <i class="fa fa-home"></i> Back to Home
                    </a>
                </div>
            </div>
        </main>
    </div>
</div>

<script th:src="@{/js/jquery-3.6.0.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
