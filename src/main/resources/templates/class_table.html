<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Class Table</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" th:href="@{/index}">RoundTable</a>
    <div class="navbar-nav">
        <a class="nav-link" th:href="@{/classTable}">Class Table</a>
        <a class="nav-link" th:href="@{/userTable}">Users</a>
    </div>
</nav>

<div class="container mt-4">
    <h2>Available Classes</h2>
    <table class="table table-striped mt-3">
        <thead>
        <tr>
            <th>Title</th>
            <th>Speaker / Lecturer</th>
            <th>Venue</th>
            <th>Date</th>
            <th>Participants</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${classList}">
            <td th:text="${c.title}">Title</td>
            <td>
                <span th:if="${c.instructor == null}" th:text="${c.speaker}">Speaker</span>
                <a th:if="${c.instructor != null}" 
                   th:href="@{/lecturer/{id}(id=${c.instructor.id})}" 
                   th:text="${c.instructor.userName}">Lecturer</a>
            </td>
            <td th:text="${c.venue != null ? c.venue.name : 'TBD'}">Venue</td>
            <td th:text="${c.date}">Date</td>
            <td th:text="${c.maxParticipants != null ? 'Max: ' + c.maxParticipants : 'Unlimited'}">Capacity</td>
            <td>
                <form th:action="@{/classTable/enroll/{id}(id=${c.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-success">Enroll</button>
                </form>
                <a th:href="@{/classTable/editTable/{id}(id=${c.id})}" class="btn btn-sm btn-primary">Edit</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
