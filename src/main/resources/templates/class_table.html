<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Class Table - RoundTable</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Available Classes</h2>
        <a th:href="@{/classTable/addTable}" class="btn btn-primary">Add New Class</a>
    </div>

    <table class="table table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Lecturer</th>
            <th>Venue</th>
            <th>Schedule</th>
            <th>Participants</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${classList}">
            <td>
                <strong th:text="${c.title}">Title</strong><br>
                <small class="text-muted" th:text="${c.subTitle}">Subtitle</small>
            </td>
            <td>
                <a th:if="${c.instructor != null}" th:href="@{/lecturer/{id}(id=${c.instructor.id})}" th:text="${c.instructor.userName}">Lecturer</a>
                <span th:if="${c.instructor == null}" th:text="${c.speaker}">Speaker</span>
            </td>
            <td>
                <span th:if="${c.venue != null}" th:text="${c.venue.name}">Venue</span>
                <span th:if="${c.venue == null}" class="text-muted italic">TBD</span>
            </td>
            <td>
                <span th:text="${c.date}">Date</span><br>
                <small class="badge bg-secondary" th:text="${c.weekly}">Weekly</small>
            </td>
            <td th:text="${c.maxParticipants != null ? 'Max: ' + c.maxParticipants : 'Unlimited'}">Capacity</td>
            <td>
                <div class="btn-group">
                    <form th:action="@{/classTable/enroll/{id}(id=${c.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-success">Enroll</button>
                    </form>
                    <a th:href="@{/classTable/editTable/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary ms-1">Edit</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script th:src="@{/js/jquery-3.6.0.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
