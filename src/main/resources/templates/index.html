<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - RoundTable</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5 text-center">
    <div class="jumbotron p-5 bg-light rounded-3">
        <h1 class="display-4">Welcome to The Round Table</h1>
        <p class="lead">A collaborative platform for class scheduling and enrollment.</p>
        <hr class="my-4">
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h3>Classes</h3>
                        <p>Browse and enroll in available courses.</p>
                        <a th:href="@{/classTable}" class="btn btn-primary">View Table</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h3>My Schedule</h3>
                        <p>Track your enrolled courses and venues.</p>
                        <a th:href="@{/myClasses}" class="btn btn-success">My Classes</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h3>Profile</h3>
                        <p>Account: <strong th:text="${session.userAccount}">Account</strong></p>
                        <p>Role: <span class="badge bg-info" th:text="${session.role}">Role</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/jquery-3.6.0.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
