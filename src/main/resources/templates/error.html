<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-5">
    <div class="jumbotron">
        <h1 class="display-4 text-danger">Oops! Something went wrong.</h1>
        <p class="lead">An unexpected error has occurred while processing your request.</p>
        <hr class="my-4">
        <p><strong>URL:</strong> <span th:text="${url}">URL</span></p>
        <p><strong>Message:</strong> <span th:text="${exception}">Exception Message</span></p>
        <a class="btn btn-primary btn-lg" th:href="@{/index}" role="button">Back to Home</a>
    </div>
</div>
</body>
</html>
