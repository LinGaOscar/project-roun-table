<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User List - RoundTable</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>User Management</h2>
        <a th:href="@{/userTable/add}" class="btn btn-primary">Add New User</a>
    </div>
    <table class="table table-striped shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Account</th>
            <th>User Name</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${userList}">
            <td th:text="${u.id}">ID</td>
            <td th:text="${u.account}">Account</td>
            <td th:text="${u.userName}">Name</td>
            <td><span class="badge bg-info text-dark" th:text="${u.role}">Role</span></td>
            <td>
                <a th:href="@{/userTable/update/{id}(id=${u.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                <a th:href="@{/userTable/delete/{id}(id=${u.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script th:src="@{/js/jquery-3.6.0.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
