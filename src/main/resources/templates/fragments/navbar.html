<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="fa fa-users"></i> RoundTable
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/classTable}">Classes</a>
                </li>
                <!-- Authenticated Users: My Classes -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/myClasses}">My Classes</a>
                </li>
                <!-- Teacher: My Courses -->
                <li class="nav-item" sec:authorize="hasAnyRole('TEACHER', 'ADMIN')">
                    <a class="nav-link" th:href="@{/teacher/class}">My Courses</a>
                </li>
                <!-- Teacher Profile -->
                <li class="nav-item" sec:authorize="hasAnyRole('TEACHER', 'ADMIN')">
                    <a class="nav-link" th:href="@{/teacher/profile}">My Profile</a>
                </li>
            </ul>
            <div class="d-flex align-items-center">
                <!-- Admin Dashboard Link -->
                <a class="btn btn-outline-light btn-sm me-2" sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">
                    <i class="fa fa-cog"></i> Admin
                </a>
                <span class="text-light me-3" sec:authorize="isAuthenticated()">
                    <i class="fa fa-user-circle"></i> <span sec:authentication="name">User</span>
                    <small class="text-muted" sec:authentication="principal.authorities">(Role)</small>
                </span>
                <a class="btn btn-outline-primary btn-sm me-2" sec:authorize="!isAuthenticated()" th:href="@{/login}">Login</a>
                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>
